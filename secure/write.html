<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<title>게시글 작성</title>
</head>

<body>
<div class="form-container theme-secure">
<h3>게시글 작성 (보안 테스트용)</h3>
<form action="write.php" method="POST" enctype="multipart/form-data">
<div class="form-group">
<label for="title">제목</label>
<input type="text" id="title" name="title" placeholder="제목을 입력하세요">
</div>
<div class="form-group">
<label for="content">내용</label>
<textarea id="content" name="content" rows="10" placeholder="내용을 입력하세요"></textarea>
</div>
<div class="form-group">
<label for="file">파일 첨부</label>
<input type="file" id="file" name="userfile">
</div>
<hr>
<button type="submit" class="submit-btn btn-secure">
게시글 등록
</button>
</form>
<br>
<button class="submit-btn btn-secure" onclick="history.back()">
뒤로가기
</button>
</div>
</body>
</html>
